<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <radialGradient id="bodyGrad" cx="42%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#dde4ec"/>
    </radialGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="128" height="128" rx="28" fill="url(#bg)"/>

  <!-- Ghost body (centered and scaled from 64→88, offset to center) -->
  <g transform="translate(20, 16) scale(1.375)" filter="url(#glow)">
    <path d="
      M32 7
      C18.7 7 9 17.5 9 30
      L9 48.5
      C9 49.8 10.6 50.5 11.6 49.6
      L15 46.5
      L18.8 49.9
      C19.7 50.7 21.1 50.6 21.9 49.7
      L25 46.2
      L28.2 49.7
      C29.1 50.7 30.5 50.7 31.4 49.7
      L32 49
      L32.6 49.7
      C33.5 50.7 34.9 50.7 35.8 49.7
      L39 46.2
      L42.1 49.7
      C42.9 50.6 44.3 50.7 45.2 49.9
      L49 46.5
      L52.4 49.6
      C53.4 50.5 55 49.8 55 48.5
      L55 30
      C55 17.5 45.3 7 32 7
      Z
    "
    fill="url(#bodyGrad)"
    stroke="#c8d4e0"
    stroke-width="0.6"
    stroke-linejoin="round"
    />

    <!-- Left eye -->
    <ellipse cx="25" cy="29" rx="5" ry="5.5" fill="#1a1f2e"/>
    <circle cx="23.2" cy="27.2" r="1.5" fill="white" opacity="0.9"/>

    <!-- Right eye -->
    <ellipse cx="39" cy="29.5" rx="4.2" ry="4.6" fill="#1a1f2e"/>
    <circle cx="37.4" cy="27.8" r="1.2" fill="white" opacity="0.9"/>

    <!-- Mouth -->
    <ellipse cx="32" cy="38.5" rx="4.5" ry="3.5" fill="#1a1f2e"/>
    <ellipse cx="32" cy="40.5" rx="3" ry="2" fill="#f06a7a"/>
    <ellipse cx="31" cy="40" rx="1" ry="0.7" fill="#f7a0aa" opacity="0.7"/>
  </g>
</svg>
