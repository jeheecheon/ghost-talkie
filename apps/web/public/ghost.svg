      L28.2 49.7
      C29.1 50.7 30.5 50.7 31.4 49.7
      L32 49
      L32.6 49.7
      C33.5 50.7 34.9 50.7 35.8 49.7
      L39 46.2
      L42.1 49.7
      C42.9 50.6 44.3 50.7 45.2 49.9
      L49 46.5
      L52.4 49.6
      C53.4 50.5 55 49.8 55 48.5
      L55 30
      C55 17.5 45.3 7 32 7
      Z
    "
    fill="url(#bodyGrad)"
    stroke="#c8d4e0"
    stroke-width="0.8"
    stroke-linejoin="round"
    />
