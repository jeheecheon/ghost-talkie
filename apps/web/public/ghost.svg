<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <radialGradient id="bodyGrad" cx="42%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#dde4ec"/>
    </radialGradient>
    <filter id="softShadow" x="-8%" y="-4%" width="116%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="2.5" flood-color="#8aa0b8" flood-opacity="0.28"/>
    </filter>
    <clipPath id="ghostClip">
      <path d="
        M32 7
        C18.7 7 9 17.5 9 30
