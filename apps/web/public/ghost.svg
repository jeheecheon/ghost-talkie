        L28.2 49.7
        C29.1 50.7 30.5 50.7 31.4 49.7
        L32 49
        L32.6 49.7
        C33.5 50.7 34.9 50.7 35.8 49.7
        L39 46.2
        L42.1 49.7
        C42.9 50.6 44.3 50.7 45.2 49.9
        L49 46.5
        L52.4 49.6
        C53.4 50.5 55 49.8 55 48.5
        L55 30
        C55 17.5 45.3 7 32 7
        Z
      "/>
    </clipPath>
  </defs>

  <!-- Ghost body with shadow -->
  <g filter="url(#softShadow)">
    <path d="
      M32 7
      C18.7 7 9 17.5 9 30
      L9 48.5
      C9 49.8 10.6 50.5 11.6 49.6
      L15 46.5
      L18.8 49.9
